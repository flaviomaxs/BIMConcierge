version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bimconcierge
      POSTGRES_USER: bimconcierge
      POSTGRES_PASSWORD: BimC0nci3rge!Dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/BIMConcierge.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bimconcierge;Username=bimconcierge;Password=BimC0nci3rge!Dev"
    depends_on:
      - postgres

volumes:
  pgdata:
